options:
  logging: CLOUD_LOGGING_ONLY

steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - -c
    - |
      docker build -t europe-southwest1-docker.pkg.dev/product-launcher-498816/image-registry/auth-ms -f dockerfile.prod --platform=linux/amd64 --build-arg DATABASE_URL=$$DATABASE_URL .
  secretEnv: ['DATABASE_URL']

- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'europe-southwest1-docker.pkg.dev/product-launcher-498816/image-registry/auth-ms',
    ]

availableSecrets:
  secretManager:
  - versionName: projects/699564746265/secrets/auth_database_url/versions/1
    env: 'DATABASE_URL'